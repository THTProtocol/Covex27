name: CI

# Covex CI. Runs on every push and pull request to master. The build + test +
# sandbox-guard + frontend-build jobs are the gates that should be marked
# "required" in the repo's branch-protection settings so they block merge to a
# live, money-handling deploy. cargo fmt + clippy are now BLOCKING (the Rust tree
# is clean). eslint + cargo audit + npm audit stay advisory (the eslint tree still
# reports errors; tighten to blocking once it is clean).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: Style (no new em/en dashes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the parent/base commit so the forward gate can diff only the
          # lines this push/PR introduced.
          fetch-depth: 0

      # GATE: block any change that ADDS an em dash (U+2014) or en dash (U+2013).
      # Legacy occurrences are grandfathered; only new ones fail. See the script.
      - name: No new em/en dashes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi
          bash scripts/check-no-emdash.sh "$BASE"

      # GATE: provider-neutrality + separation. Covex ships oracle connectors but is never
      # itself a provider and advertises no specific one; the separate oracle project and any
      # specific third-party oracle product must never be named anywhere in the tree.
      - name: No forbidden project/product names
        run: bash scripts/check-forbidden-names.sh

      # Setup node so the ZK registry honesty gate (pure node, no snarkjs) can run.
      - name: Setup Node (for zk registry gate)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # GATE: the ZK circuit registry must be HONEST. zk/circuit_registry.json must be freshly
      # generated from the committed served artifacts, every circuit it marks provable must ship a
      # real served _final.zkey + wasm + vkey (no over-claim), every frontend VERIFIED_FULL_ZK id
      # must resolve to a served proving key, and no served _final.zkey may be silently omitted.
      # This blocks any change that claims a circuit "works" without a key that can actually
      # generate a verifiable proof. See scripts/check-zk-registry.sh.
      - name: ZK circuit registry is honest vs served keys
        run: bash scripts/check-zk-registry.sh

  backend:
    name: Backend (build + test + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        # The build relies on backend/vendor (Cargo.toml patches
        # kaspa-consensus-core to a vendored path), which is committed in-repo,
        # so a plain checkout resolves the patch.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      # GATE: the release build must succeed (a vendored sighash debug_assert
      # panics in debug, so the project builds and tests in release).
      - name: cargo build --release
        run: cargo build --release

      # GATE: the 88 backend tests (they live in the bin target; --release is
      # required for the engine/sighash tests).
      - name: cargo test --release
        run: cargo test --release

      # Advisory: formatting. The tree currently carries broad rustfmt drift (the earlier
      # "clean" claim was stale: ~105 files), so a blocking gate would red every commit. Kept
      # advisory until a dedicated `cargo fmt --all` sweep lands (coordinated, so it does not
      # clobber concurrent backend work), after which this returns to blocking.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # GATE: clippy must pass. No -D warnings (so it fails only on hard errors / deny-level
      # lints), and the tree is clean today, so this blocks a clippy regression without
      # demanding a noisy warning sweep.
      - name: cargo clippy
        run: cargo clippy --release

      # Advisory: known-vulnerable Rust dependencies (RustSec advisory DB). Surfaces
      # supply-chain risk on a money-handling backend without blocking the build.
      - name: cargo audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked || true
          cargo audit || true

  frontend:
    name: Frontend (sandbox guard + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      # GATE: the XSS-escape sandbox guard (fails if a user-content srcDoc iframe
      # carries allow-same-origin). Also runs again via the prebuild hook below.
      - name: Sandbox allow-list guard
        run: npm run check:sandbox

      # GATE: frontend unit tests (vitest) for the pure money-path / honesty logic
      # (network-accurate explorer routing, the grounded assistant's no-invent guarantee).
      - name: vitest
        run: npm test

      # Advisory: eslint. Kept non-blocking because the existing tree reports ~286 errors
      # (mostly react-hooks/set-state-in-effect + no-unused-vars), so a red gate here would
      # block every push without a dedicated cleanup. Tighten to blocking once the count is 0.
      - name: eslint
        run: npm run lint
      # Advisory: known-vulnerable npm dependencies (high severity and up).
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # GATE: the production build must succeed (its prebuild hook re-runs the
      # sandbox guard AND rebuilds the offline cold-recovery tool).
      - name: vite build
        run: npm run build

      # GATE: the self-contained offline payout tool must be present in dist/ after the build
      # (the prebuild hook builds it into public/tools/cold-recovery and vite copies public/
      # into dist/). It is served at /tools/cold-recovery/covex-cold-recovery.html, so a broken
      # prebuild (missing wasm, template change) must fail CI rather than ship a dead link.
      - name: Cold-recovery tool present in dist
        run: |
          f="dist/tools/cold-recovery/covex-cold-recovery.html"
          if [ ! -s "$f" ]; then
            echo "MISSING: $f (the offline cold-recovery payout tool was not built into dist/)"
            exit 1
          fi
          echo "OK: $f ($(wc -c < "$f") bytes)"

      # GATE (honesty anti-drift): the standalone cold-recovery tool once hand-duplicated the
      # claimability matrix and drifted into "Covex oracle" copy that contradicts the trustless
      # reframe. The build now INJECTS the matrix from the canonical KIND_CLAIM_MATRIX
      # (src/lib/redeemer/covenantRedeemer.js). This asserts the BUILT tool's matrix kinds +
      # offline flags equal that source of truth AND that it carries zero "Covex oracle"
      # mentions, so the fund-path surface can never silently drift again.
      - name: Cold-recovery matrix matches KIND_CLAIM_MATRIX
        run: npm run check:cold-tool

      # GATE (money-path byte-parity anti-drift): the standalone cold-recovery tool's
      # consensus-critical satisfier (buildSatisfier + push65 + pushData + sigOpCount + helpers)
      # is now INJECTED from the canonical covenantRedeemer.js rather than hand-copied. This runs
      # the BUILT tool's OWN buildSatisfier for every kind+branch in tests/fixtures/satisfier_golden.json
      # and asserts the bytes EXACTLY equal the golden - the same byte-parity guarantee the in-app JS
      # (covenantRedeemer.golden.test.js) and the Rust side (satisfier_golden_cross_language_parity)
      # already enforce, so the cold tool's fund-path satisfier can never silently drift.
      - name: Cold-recovery satisfier matches the cross-language golden
        run: npm run check:cold-tool-satisfier

  zk-image-id:
    name: ZK guest image-id (no drift from the on-chain pin)
    runs-on: ubuntu-latest
    # Advisory: the RISC0 guest toolchain install (rzup) is heavy and currently fails its
    # download in CI, so this drift gate cannot run reliably. Kept non-blocking until the
    # rzup install is pinned/cached and the job is green again, then return it to blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # GATE (on-chain-ZK anti-drift): the KIP-16 ZkGameSettle settlement covenant pins ONE guest
      # image id on-chain. The backend ships it as a frozen literal (GAMES_GUEST_ID in
      # zkvm/onchain/src/lib.rs). If the guest source OR the RISC0 toolchain drifts, the compiled
      # image id no longer equals that literal: the prover would self-verify receipts that every
      # deployed covenant REJECTS on-chain, silently bricking the games payout path. This job runs
      # the existing `image_id_matches_methods` dev-test (re-derives the image id from a fresh guest
      # compile and asserts equality) so a drift FAILS the build and forces re-freezing the literal +
      # redeploying the covenant. It does NOT edit any zkvm source (Lane C owns it); it only RUNS the
      # check. The guest *compile* needs the RISC0 toolchain but NOT Docker/proving, so it is CI-light.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target (zkvm/onchain)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zkvm/onchain

      # The pin was frozen under RISC0 1.94.1 / risc0-zkvm 3.0.5; install that guest toolchain so a
      # toolchain bump does not masquerade as a source drift. rzup puts the guest toolchain in
      # ~/.risc0/bin, which the check script adds to PATH.
      - name: Install RISC0 guest toolchain (rzup)
        run: |
          curl -L https://risczero.com/install | bash
          export PATH="$HOME/.risc0/bin:$PATH"
          rzup install rust 1.94.1 || rzup install rust || rzup install
          rzup install r0vm || true

      - name: Frozen GAMES_GUEST_ID matches the live guest compile
        run: bash scripts/check-zk-image-id.sh
