# Covex nginx site. This mirrors the LIVE config on hightable.pro at
# /etc/nginx/sites-enabled/hightable.pro (verified 2026-06-12).
#
# Key details that MUST be preserved:
#   - /api/ proxies with a TRAILING SLASH on proxy_pass, which strips the
#     /api prefix before it reaches the backend (backend routes have no /api)
#   - /api/ws needs the Upgrade/Connection headers or WebSockets break
#   - SPA shell is no-cache; hashed /assets are immutable for 1 year
#
# SSL certs come from certbot (letsencrypt). After editing:
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name hightable.pro www.hightable.pro;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name hightable.pro www.hightable.pro;
    ssl_certificate /etc/letsencrypt/live/hightable.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hightable.pro/privkey.pem;

    root /root/htp/public;
    index index.html;

    # SPA: all routes fall back to index.html for client-side routing (studio, deploy, editor, etc.)
    location / {
        # SPA shell must always revalidate so deploys reach users immediately
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Real backend health for monitoring (was falling through to the SPA shell)
    location = /healthz {
        proxy_pass http://127.0.0.1:3006/health;
    }

    # Hashed build assets are immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # WebSocket live feed
    location = /api/ws {
        proxy_pass http://127.0.0.1:3006/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    client_max_body_size 10m;
}
