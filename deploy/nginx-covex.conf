# Covex nginx site. This mirrors the LIVE config on hightable.pro at
# /etc/nginx/sites-enabled/hightable.pro (verified 2026-06-12).
#
# Key details that MUST be preserved:
#   - /api/ proxies with a TRAILING SLASH on proxy_pass, which strips the
#     /api prefix before it reaches the backend (backend routes have no /api)
#   - /api/ws needs the Upgrade/Connection headers or WebSockets break
#   - SPA shell is no-cache; hashed /assets are immutable for 1 year
#
# SSL certs come from certbot (letsencrypt). After editing:
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name hightable.pro www.hightable.pro;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name hightable.pro www.hightable.pro;
    ssl_certificate /etc/letsencrypt/live/hightable.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hightable.pro/privkey.pem;

    root /root/htp/public;
    index index.html;

    # Per-covenant link unfurls: social-media crawlers hitting /covenant/<id>
    # get backend-rendered Open Graph meta (GET /og/covenant/<id>); humans get
    # the SPA. Only the bare /covenant/<id> route is special-cased; /fix and
    # /studio sub-routes and all other paths fall through to the SPA below.
    # (if + proxy_pass on a User-Agent test is the one documented-safe use of if.)
    # The covenant id uses a NAMED capture ($cid): the User-Agent regex below
    # also captures, which would otherwise clobber a positional $1 inside the if.
    location ~ ^/covenant/(?<cid>[^/]+)/?$ {
        if ($http_user_agent ~* "(twitterbot|facebookexternalhit|discordbot|slackbot-linkexpanding|slackbot|linkedinbot|whatsapp|telegrambot|googlebot|bingbot|redditbot|pinterest|skypeuripreview|embedly|quora link preview|vkshare|applebot|bsky|mastodon|iframely)") {
            proxy_pass http://127.0.0.1:3006/og/covenant/$cid;
        }
        add_header Cache-Control "no-cache";
        # Defense-in-depth (A11). object-src/base-uri/frame-ancestors/form-action only.
        # script-src/style-src are intentionally NOT locked yet: index.html ships an inline
        # error-bootstrap script and inline styles are used widely, so a full script-src CSP
        # needs the cross-origin sandbox (roadmap B2) first. Applied live via deploy/apply_csp.py.
        add_header Content-Security-Policy "object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri /index.html;
    }

    # Embeddable read-only covenant widgets (/embed/...). Allow ANY site to frame these,
    # and ONLY these (the rest of the site stays frame-ancestors 'self'). The widget never
    # signs - it opens Covex in a new tab - so cross-origin framing is clickjacking-safe.
    # NOTE: serve the SPA shell WITHIN this location via `rewrite ... break` rather than
    # `try_files $uri /index.html`, because try_files internal-redirects to /index.html which
    # re-matches `location /` and would overwrite these add_headers with frame-ancestors 'self'.
    location ^~ /embed/ {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "object-src 'none'; base-uri 'self'; frame-ancestors *; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        rewrite ^ /index.html break;
    }

    # SPA: all routes fall back to index.html for client-side routing (studio, deploy, editor, etc.)
    location / {
        # SPA shell must always revalidate so deploys reach users immediately
        add_header Cache-Control "no-cache";
        # Defense-in-depth (A11). object-src/base-uri/frame-ancestors/form-action only.
        # script-src/style-src are intentionally NOT locked yet: index.html ships an inline
        # error-bootstrap script and inline styles are used widely, so a full script-src CSP
        # needs the cross-origin sandbox (roadmap B2) first. Applied live via deploy/apply_csp.py.
        add_header Content-Security-Policy "object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri $uri/ /index.html;
    }

    # Real backend health for monitoring (was falling through to the SPA shell)
    location = /healthz {
        proxy_pass http://127.0.0.1:3006/health;
    }

    # Hashed build assets are immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # WebSocket live feed
    location = /api/ws {
        proxy_pass http://127.0.0.1:3006/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    client_max_body_size 10m;
}
