<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="COVEX, the covenant explorer and studio for Kaspa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1018"/>
      <stop offset="0.55" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#0b2430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#70C7BA"/>
      <stop offset="1" stop-color="#49EACB"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="14" fill="url(#bg)"/>

  <!-- BlockDAG motif, left -->
  <g stroke="#70C7BA" stroke-opacity="0.22" stroke-width="1.6" fill="none">
    <path d="M60 70 L130 110 M60 70 L120 40 M120 40 L190 80 M130 110 L190 80 M130 110 L150 180 M190 80 L250 120 M150 180 L250 120 M150 180 L210 230 M250 120 L210 230 M210 230 L290 200 M250 120 L290 200"/>
  </g>
  <g fill="#70C7BA">
    <circle cx="60" cy="70" r="5" fill-opacity="0.55"/>
    <circle cx="120" cy="40" r="4" fill-opacity="0.4"/>
    <circle cx="130" cy="110" r="6" fill-opacity="0.7"/>
    <circle cx="190" cy="80" r="4.5" fill-opacity="0.5"/>
    <circle cx="150" cy="180" r="5.5" fill-opacity="0.65"/>
    <circle cx="250" cy="120" r="7" fill-opacity="0.85"/>
    <circle cx="210" cy="230" r="4.5" fill-opacity="0.45"/>
    <circle cx="290" cy="200" r="5" fill-opacity="0.6"/>
  </g>

  <!-- BlockDAG motif, right (mirrored feel) -->
  <g stroke="#70C7BA" stroke-opacity="0.22" stroke-width="1.6" fill="none">
    <path d="M1140 230 L1070 190 M1140 230 L1080 260 M1080 260 L1010 220 M1070 190 L1010 220 M1070 190 L1050 120 M1010 220 L950 180 M1050 120 L950 180 M1050 120 L990 70 M950 180 L990 70 M990 70 L910 100 M950 180 L910 100"/>
  </g>
  <g fill="#70C7BA">
    <circle cx="1140" cy="230" r="5" fill-opacity="0.55"/>
    <circle cx="1080" cy="260" r="4" fill-opacity="0.4"/>
    <circle cx="1070" cy="190" r="6" fill-opacity="0.7"/>
    <circle cx="1010" cy="220" r="4.5" fill-opacity="0.5"/>
    <circle cx="1050" cy="120" r="5.5" fill-opacity="0.65"/>
    <circle cx="950" cy="180" r="7" fill-opacity="0.85"/>
    <circle cx="990" cy="70" r="4.5" fill-opacity="0.45"/>
    <circle cx="910" cy="100" r="5" fill-opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <text x="615" y="152" text-anchor="middle"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="26" fill="#E8F6F3">COVEX</text>
  <rect x="420" y="178" width="360" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="600" y="222" text-anchor="middle"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="21" font-weight="500" letter-spacing="4" fill="#9fb8c9">THE COVENANT EXPLORER AND STUDIO FOR KASPA</text>
  <text x="600" y="258" text-anchor="middle"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400" letter-spacing="2" fill="#5f7a8a">REAL ON-CHAIN DATA ONLY · BUILT FOR THE TOCCATA MAINNET ERA</text>
</svg>
