<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Brand fonts: index.css declares Inter + JetBrains Mono but they were never loaded,
         so the whole site fell back to system-ui. Load them for the intended premium type.
         Weights are pruned to ONLY the ones actually rendered (audited via font-* utility usage):
         Inter 400/500/600/700/800/900 are all in use (font-normal..font-black). JetBrains Mono is
         used at 400/600/700 (and 900 falls back to 700); mono 500 had zero usages and was dropped to
         shrink this render-blocking stylesheet request. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" />
    <link rel="icon" type="image/png" href="/covex-logo-192.png" />
    <link rel="apple-touch-icon" href="/covex-logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Covex is the covenant explorer and studio for Kaspa mainnet. Index every covenant, interact with any of them, design and verify your own. Non-custodial, real on-chain data only, built for the Toccata mainnet era." />
    <meta name="theme-color" content="#05050A" />

    <!-- Open Graph / Twitter: site-wide defaults. Per-covenant unfurls are
         served to social crawlers by the backend (GET /og/covenant/:id). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Covex" />
    <meta property="og:title" content="Covex: The Covenant Explorer and Studio for Kaspa" />
    <meta property="og:description" content="Index every covenant, interact with any of them, design and verify your own. Built for the Toccata mainnet era. Real on-chain data only." />
    <meta property="og:url" content="https://hightable.pro/" />
    <meta property="og:image" content="https://hightable.pro/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Covex: The Covenant Explorer and Studio for Kaspa" />
    <meta name="twitter:description" content="Index every covenant, interact with any of them, design and verify your own. Real on-chain data only." />
    <meta name="twitter:image" content="https://hightable.pro/og-cover.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Structured data. Honesty-disciplined: every claim here is true on the built
         site. No SearchAction (the Explorer search is client-side, not a ?q= URL) and
         no sameAs / ratings / prices we cannot verify. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://hightable.pro/#org",
          "name": "Covex",
          "url": "https://hightable.pro/",
          "logo": "https://hightable.pro/covex-logo-512.png",
          "description": "Neutral, non-custodial covenant infrastructure for Kaspa. Covex holds no funds, takes no rake, and never attests an outcome."
        },
        {
          "@type": "WebSite",
          "@id": "https://hightable.pro/#website",
          "name": "Covex",
          "url": "https://hightable.pro/",
          "description": "The covenant explorer and studio for Kaspa mainnet. Index every covenant, interact with any of them, design and verify your own. Non-custodial, real on-chain data only.",
          "publisher": { "@id": "https://hightable.pro/#org" },
          "inLanguage": "en"
        }
      ]
    }
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="/covex-logo-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/covex-logo-16.png" />
    <link rel="apple-touch-icon" href="/covex-logo-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="COVEX" />
    <title>Covex</title>
    <style>
      #covex-error-display {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
        background: #1a0000; border-bottom: 2px solid #ff4444;
        color: #ff8888; font: 12px/1.5 monospace; padding: 16px; max-height: 50vh; overflow: auto;
      }
      #covex-error-dismiss {
        float: right; background: none; border: 1px solid #ff4444; color: #ff4444;
        cursor: pointer; padding: 2px 8px; font: 11px monospace; border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="covex-error-display"></div>
    <script>
      window.__covexErrors = [];
      var ed = document.getElementById('covex-error-display');
      // Wallet init rejections from @kasflow / extensions are expected.
      // Also filter common extension stream noise (MaxListeners, ObjectMultiplex liveness, multiplex chunks)
      // that appear in contentscript when multiple wallets or the page + extension streams interact.
      function isWalletNoise(msg) {
        if (!msg) return false;
        const m = String(msg).toLowerCase();
        if (/covex/i.test(m)) return false; // our errors are never "noise"
        return /wallet|account|passkey|kasflow|connect|metamask|ethereum|multiplex|liveness|maxlisteners|orphaned data|malformed chunk|contentscript/i.test(m);
      }
      function showErrors() {
        var real = window.__covexErrors.filter(function(e) { return !isWalletNoise(e); });
        if (real.length > 0) {
          ed.style.display = 'block';
          ed.innerHTML = '<button id="covex-error-dismiss" onclick="document.getElementById(\'covex-error-display\').style.display=\'none\'">Dismiss</button><strong>Startup Errors:</strong><br>' + real.map(function(e,i) { return (i+1) + '. ' + e; }).join('<br>');
        }
      }
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName === 'SCRIPT') {
          window.__covexErrors.push('SCRIPT LOAD FAIL: ' + (e.target.src || 'inline'));
        } else {
          var msg = (e.message || e.error || 'unknown');
          if (!isWalletNoise(msg)) {
            window.__covexErrors.push('ERROR: ' + msg + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
          }
        }
        showErrors();
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason));
        window.__covexErrors.push('REJECTION: ' + msg);
        showErrors();
      });
      setTimeout(showErrors, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
