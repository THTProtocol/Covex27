<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Covex — Native SilverScript covenant indexing and deployment on the Kaspa BlockDAG. Non-custodial. Transparent. 10 BPS." />
    <meta name="theme-color" content="#05050A" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="COVEX" />
    <title>Covex - Kaspa Covenant Platform</title>
    <style>
      #covex-error-display {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
        background: #1a0000; border-bottom: 2px solid #ff4444;
        color: #ff8888; font: 12px/1.5 monospace; padding: 16px; max-height: 50vh; overflow: auto;
      }
      #covex-error-dismiss {
        float: right; background: none; border: 1px solid #ff4444; color: #ff4444;
        cursor: pointer; padding: 2px 8px; font: 11px monospace; border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="covex-error-display"></div>
    <script>
      window.__covexErrors = [];
      var ed = document.getElementById('covex-error-display');
      // Wallet init rejections from @kasflow are expected when no wallet extension is present
      function isWalletNoise(msg) {
        return /wallet|account|passkey|kasflow|connect/i.test(msg) && !/covex/i.test(msg);
      }
      function showErrors() {
        var real = window.__covexErrors.filter(function(e) { return !isWalletNoise(e); });
        if (real.length > 0) {
          ed.style.display = 'block';
          ed.innerHTML = '<button id="covex-error-dismiss" onclick="document.getElementById(\'covex-error-display\').style.display=\'none\'">Dismiss</button><strong>Startup Errors:</strong><br>' + real.map(function(e,i) { return (i+1) + '. ' + e; }).join('<br>');
        }
      }
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName === 'SCRIPT') {
          window.__covexErrors.push('SCRIPT LOAD FAIL: ' + (e.target.src || 'inline'));
        } else {
          var msg = (e.message || e.error || 'unknown');
          if (!isWalletNoise(msg)) {
            window.__covexErrors.push('ERROR: ' + msg + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
          }
        }
        showErrors();
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason));
        window.__covexErrors.push('REJECTION: ' + msg);
        showErrors();
      });
      setTimeout(showErrors, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
