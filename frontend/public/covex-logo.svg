<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glowGrad" x1="100" y1="100" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff9d"/>
      <stop offset="30%" stop-color="#00e5ff"/>
      <stop offset="70%" stop-color="#00b8ff"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background subtle grid / tech field (for the vibe) -->
  <g opacity="0.15" stroke="#00ff9d" stroke-width="1">
    <path d="M50 50 L462 50 M50 100 L462 100 M50 150 L462 150 M50 200 L462 200 M50 250 L462 250 M50 300 L462 300 M50 350 L462 350 M50 400 L462 400 M50 450 L462 450"/>
    <path d="M50 50 L50 462 M100 50 L100 462 M150 50 L150 462 M200 50 L200 462 M250 50 L250 462 M300 50 L300 462 M350 50 L350 462 M400 50 L400 462 M450 50 L450 462"/>
  </g>

  <!-- The main glowing network "C" - lots of nodes + connecting edges forming a bold C with internal triangulation / mesh -->
  <!-- Outer C path with many segments -->
  <g stroke="url(#glowGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineGlow)">
    <!-- Upper arm of C -->
    <line x1="140" y1="120" x2="200" y2="90"/>
    <line x1="200" y1="90" x2="280" y2="85"/>
    <line x1="280" y1="85" x2="360" y2="110"/>
    <!-- Right curve down -->
    <line x1="360" y1="110" x2="395" y2="170"/>
    <line x1="395" y1="170" x2="400" y2="250"/>
    <line x1="400" y1="250" x2="385" y2="320"/>
    <!-- Lower arm -->
    <line x1="385" y1="320" x2="320" y2="370"/>
    <line x1="320" y1="370" x2="240" y2="390"/>
    <line x1="240" y1="390" x2="160" y2="365"/>
    <!-- Left vertical + inner connections to make full network C -->
    <line x1="160" y1="365" x2="125" y2="300"/>
    <line x1="125" y1="300" x2="120" y2="200"/>
    <line x1="120" y1="200" x2="140" y2="120"/>
    <!-- Internal mesh / triangulation for the "network" look -->
    <line x1="160" y1="140" x2="220" y2="160"/>
    <line x1="220" y1="160" x2="300" y2="155"/>
    <line x1="300" y1="155" x2="350" y2="190"/>
    <line x1="350" y1="190" x2="365" y2="260"/>
    <line x1="365" y1="260" x2="340" y2="310"/>
    <line x1="340" y1="310" x2="270" y2="340"/>
    <line x1="270" y1="340" x2="190" y2="325"/>
    <line x1="190" y1="325" x2="150" y2="260"/>
    <!-- More crossing connections for density -->
    <line x1="180" y1="180" x2="260" y2="200"/>
    <line x1="260" y1="200" x2="320" y2="230"/>
    <line x1="320" y1="230" x2="340" y2="290"/>
    <line x1="200" y1="280" x2="280" y2="290"/>
    <line x1="150" y1="220" x2="230" y2="250"/>
  </g>

  <!-- Bright glowing nodes (larger at key points, smaller accents) -->
  <g fill="#00ff9d" filter="url(#nodeGlow)">
    <!-- Key outer nodes -->
    <circle cx="140" cy="120" r="9"/>
    <circle cx="200" cy="90" r="8"/>
    <circle cx="280" cy="85" r="8.5"/>
    <circle cx="360" cy="110" r="9"/>
    <circle cx="395" cy="170" r="7.5"/>
    <circle cx="400" cy="250" r="8"/>
    <circle cx="385" cy="320" r="8"/>
    <circle cx="320" cy="370" r="7.5"/>
    <circle cx="240" cy="390" r="8.5"/>
    <circle cx="160" cy="365" r="8"/>
    <circle cx="125" cy="300" r="7"/>
    <circle cx="120" cy="200" r="8"/>
    <!-- Inner mesh nodes -->
    <circle cx="180" cy="180" r="5.5"/>
    <circle cx="220" cy="160" r="6"/>
    <circle cx="260" cy="200" r="5"/>
    <circle cx="300" cy="155" r="6"/>
    <circle cx="320" cy="230" r="5.5"/>
    <circle cx="350" cy="190" r="6"/>
    <circle cx="365" cy="260" r="5"/>
    <circle cx="340" cy="290" r="5.5"/>
    <circle cx="280" cy="290" r="5"/>
    <circle cx="230" cy="250" r="5.5"/>
    <circle cx="200" cy="280" r="5"/>
    <circle cx="270" cy="340" r="5.5"/>
    <!-- Extra accent dots for particle / tech feel -->
    <circle cx="310" cy="120" r="3" opacity="0.9"/>
    <circle cx="380" cy="210" r="2.5" opacity="0.8"/>
    <circle cx="170" cy="320" r="3" opacity="0.85"/>
    <circle cx="290" cy="360" r="2.5" opacity="0.75"/>
  </g>

  <!-- Center "core" node for the C -->
  <circle cx="255" cy="240" r="4" fill="#ffffff" filter="url(#nodeGlow)" opacity="0.9"/>
</svg>
