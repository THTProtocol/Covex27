    <line x1="8" y1="10" x2="24" y2="10" stroke="url(#g)" stroke-width="1.18" opacity="0.68"/>
    <line x1="8" y1="24" x2="24" y2="10" stroke="url(#g)" stroke-width="0.98" opacity="0.58"/>
    <line x1="8" y1="24" x2="24" y2="38" stroke="url(#g)" stroke-width="0.98" opacity="0.58"/>
