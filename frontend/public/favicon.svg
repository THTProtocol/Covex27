<svg xmlns="http://www.w3.org/2000/svg" width="48" height="46" fill="none" viewBox="0 0 48 46">
  <defs>
    <filter id="cGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="24" cy="23" r="22" fill="none" stroke="url(#cGrad)" stroke-width="1.5" opacity="0.3"/>
  <!-- C letterform -->
  <path d="M34 12C31 8 26 6 20 6C10 6 8 16 8 23s2 17 12 17c6 0 11-2 14-6" fill="none" stroke="url(#cGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cGlow)"/>
  <!-- Connecting nodes on the ring -->
  <circle cx="24" cy="1" r="2.5" fill="#49EACB" opacity="0.8" filter="url(#cGlow)"/>
  <circle cx="44" cy="13" r="2" fill="#00D2FF" opacity="0.6"/>
  <circle cx="45" cy="32" r="2.5" fill="#49EACB" opacity="0.5"/>
  <circle cx="3" cy="13" r="2" fill="#00D2FF" opacity="0.6"/>
  <circle cx="4" cy="32" r="2" fill="#49EACB" opacity="0.5"/>
  <!-- Center node -->
  <circle cx="24" cy="23" r="3" fill="#49EACB" filter="url(#cGlow)"/>
</svg>
