<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b1"/>
      <feGaussianBlur stdDeviation="3.8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="45%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
  </defs>
  <g filter="url(#glow)">
    <circle cx="8" cy="8" r="2.4" fill="#49EACB"/>
    <circle cx="8" cy="24" r="3.6" fill="#00D2FF"/>
    <circle cx="8" cy="40" r="2.4" fill="#7e14ff"/>
    <circle cx="24" cy="8" r="2.2" fill="#7e14ff" opacity="0.92"/>
    <circle cx="24" cy="40" r="2.2" fill="#49EACB" opacity="0.92"/>
    <circle cx="40" cy="8" r="2.4" fill="#00D2FF"/>
    <circle cx="40" cy="24" r="3.6" fill="#49EACB"/>
    <circle cx="40" cy="40" r="2.4" fill="#7e14ff"/>
    <line x1="8" y1="8" x2="24" y2="8" stroke="url(#g)" stroke-width="1.3" opacity="0.7"/>
    <line x1="8" y1="24" x2="24" y2="8" stroke="url(#g)" stroke-width="1.05" opacity="0.6"/>
    <line x1="8" y1="24" x2="24" y2="40" stroke="url(#g)" stroke-width="1.05" opacity="0.6"/>
    <line x1="8" y1="40" x2="24" y2="40" stroke="url(#g)" stroke-width="1.3" opacity="0.7"/>
    <line x1="24" y1="8" x2="40" y2="8" stroke="url(#g)" stroke-width="1.3" opacity="0.7"/>
    <line x1="24" y1="40" x2="40" y2="40" stroke="url(#g)" stroke-width="1.3" opacity="0.7"/>
    <line x1="24" y1="8" x2="40" y2="24" stroke="url(#g)" stroke-width="1.05" opacity="0.6"/>
    <line x1="24" y1="40" x2="40" y2="24" stroke="url(#g)" stroke-width="1.05" opacity="0.6"/>
    <line x1="8" y1="8" x2="8" y2="24" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
    <line x1="8" y1="24" x2="8" y2="40" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
    <line x1="40" y1="8" x2="40" y2="24" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
    <line x1="40" y1="24" x2="40" y2="40" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
  </g>
</svg>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="50%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="50%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
  </defs>
  <!-- Interconnected-node C (left) -->
  <g filter="url(#glow)">
    <!-- Inner connections -->
    <line x1="8" y1="14" x2="12" y2="10" stroke="url(#g)" stroke-width="0.8" opacity="0.35"/>
    <line x1="8" y1="30" x2="14" y2="32" stroke="url(#g)" stroke-width="0.8" opacity="0.3"/>
    <line x1="8" y1="42" x2="12" y2="46" stroke="url(#g)" stroke-width="0.8" opacity="0.35"/>
    <!-- Outer C-ring nodes -->
    <line x1="6" y1="10" x2="6" y2="46" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="10" x2="16" y2="8" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="8" x2="20" y2="14" stroke="url(#g)" stroke-width="0.8" opacity="0.4"/>
    <line x1="6" y1="46" x2="16" y2="48" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="48" x2="20" y2="42" stroke="url(#g)" stroke-width="0.8" opacity="0.4"/>
    <!-- Cross connects -->
    <line x1="12" y1="10" x2="16" y2="18" stroke="url(#g)" stroke-width="0.6" opacity="0.3"/>
    <line x1="14" y1="32" x2="18" y2="38" stroke="url(#g)" stroke-width="0.6" opacity="0.3"/>
    <line x1="10" y1="28" x2="18" y2="28" stroke="url(#g)" stroke-width="0.6" opacity="0.25"/>
    <!-- Nodes -->
    <circle cx="6" cy="10" r="2.5" fill="#49EACB"/>
    <circle cx="16" cy="8" r="1.8" fill="#7e14ff" opacity="0.8"/>
    <circle cx="20" cy="14" r="1.5" fill="#00D2FF" opacity="0.7"/>
    <circle cx="6" cy="28" r="2.8" fill="#00D2FF"/>
    <circle cx="6" cy="46" r="2.5" fill="#7e14ff"/>
    <circle cx="16" cy="48" r="1.8" fill="#49EACB" opacity="0.8"/>
    <circle cx="20" cy="42" r="1.5" fill="#00D2FF" opacity="0.7"/>
    <circle cx="12" cy="10" r="1.2" fill="#49EACB" opacity="0.5"/>
    <circle cx="14" cy="32" r="1.2" fill="#7e14ff" opacity="0.5"/>
    <circle cx="18" cy="28" r="1.5" fill="#49EACB" opacity="0.4"/>
    <circle cx="18" cy="38" r="1.2" fill="#00D2FF" opacity="0.4"/>
    <circle cx="10" cy="28" r="1" fill="#49EACB" opacity="0.35"/>
  </g>
  <!-- V --><text x="32" y="43" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="url(#gh)" letter-spacing="-0.5">O</text>
  <text x="62" y="43" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="url(#gh)" letter-spacing="-0.5">V</text>
  <text x="90" y="43" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="url(#gh)" letter-spacing="-0.5">E</text>
  <text x="119" y="43" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="url(#gh)" letter-spacing="-0.5">X</text>
  <!-- Subtle metallic shine line -->
  <line x1="32" y1="11" x2="142" y2="11" stroke="url(#gh)" stroke-width="0.5" opacity="0.25"/>
  <!-- Decorative dot -->
  <circle cx="148" cy="17" r="1.5" fill="#49EACB" opacity="0.6" filter="url(#softGlow)"/>
</svg>
