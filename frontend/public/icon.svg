<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="50%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b1"/>
      <feGaussianBlur stdDeviation="3.6" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- DAG block (hexagon) at center -->
    <polygon points="24,6 39,14 39,34 24,42 9,34 9,14"
             fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Inner connection nodes -->
    <circle cx="24" cy="8" r="2.5" fill="#49EACB"/>
    <circle cx="36" cy="17" r="2.5" fill="#00D2FF"/>
    <circle cx="36" cy="31" r="2.5" fill="#7e14ff"/>
    <circle cx="24" cy="40" r="2.5" fill="#7e14ff"/>
    <circle cx="12" cy="31" r="2.5" fill="#00D2FF"/>
    <circle cx="12" cy="17" r="2.5" fill="#49EACB"/>
    <!-- C arc wrapping right side -->
    <path d="M 28 10 A 18 18 0 0 1 28 38"
          fill="none" stroke="url(#g)" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="24" cy="24" r="3" fill="url(#g)"/>
  </g>
</svg>
