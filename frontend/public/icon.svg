<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Kaspa DAG vibe gradient: teal -> cyan -> purple -->
    <linearGradient id="dagGrad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="35%" stop-color="#00D2FF"/>
      <stop offset="65%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="8" y1="12" x2="40" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#49EACB" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.65"/>
    </linearGradient>
    <!-- Strong glow for DAG nodes -->
    <filter id="dagGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur1"/>
      <feGaussianBlur in="blur1" stdDeviation="2.8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner glow for depth -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="ng"/>
      <feMerge>
        <feMergeNode in="ng"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background subtle DAG field (very faint block outlines for vibe) -->
  <g opacity="0.12" stroke="#49EACB" stroke-width="0.8">
    <polygon points="8,10 18,6 28,10 28,20 18,24 8,20"/>
    <polygon points="20,18 30,14 40,18 40,28 30,32 20,28"/>
    <polygon points="12,26 22,22 32,26 32,36 22,40 12,36"/>
  </g>

  <!-- Main central DAG block (irregular for organic Kaspa feel) -->
  <g filter="url(#dagGlow)">
    <!-- Central block (slightly irregular hexagon representing a Kaspa block in the DAG) -->
    <polygon 
      points="24,5 42,13 43,33 25,44 7,34 6,14" 
      fill="none" 
      stroke="url(#dagGrad)" 
      stroke-width="2.4" 
      stroke-linejoin="round"/>
    
    <!-- Multiple parent/child edges showing real blockDAG structure (GHOSTDAG/SPECTRE vibe) -->
    <!-- Top-left parent edge -->
    <path d="M12 18 Q18 12 24 8" fill="none" stroke="url(#edgeGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Top-right parent edge -->
    <path d="M36 18 Q30 12 24 8" fill="none" stroke="url(#edgeGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Left merge edge -->
    <path d="M10 30 Q16 26 22 28" fill="none" stroke="url(#edgeGrad)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Right merge edge -->
    <path d="M38 30 Q32 26 26 28" fill="none" stroke="url(#edgeGrad)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Bottom-left child -->
    <path d="M12 36 Q18 40 24 42" fill="none" stroke="url(#edgeGrad)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Bottom-right child -->
    <path d="M36 36 Q30 40 24 42" fill="none" stroke="url(#edgeGrad)" stroke-width="1.3" stroke-linecap="round"/>
    
    <!-- DAG nodes (8+ nodes for rich vibe, different sizes for hierarchy) -->
    <!-- Parent level -->
    <circle cx="11" cy="15" r="2.8" fill="#49EACB" filter="url(#nodeGlow)"/>
    <circle cx="37" cy="15" r="2.6" fill="#00D2FF" filter="url(#nodeGlow)"/>
    
    <!-- Mid level (more connections) -->
    <circle cx="8" cy="28" r="2.4" fill="#3B82F6" filter="url(#nodeGlow)"/>
    <circle cx="24" cy="24" r="3.8" fill="url(#dagGrad)" filter="url(#nodeGlow)"/> <!-- Central prominent -->
    <circle cx="40" cy="28" r="2.4" fill="#7C3AED" filter="url(#nodeGlow)"/>
    
    <!-- Child level -->
    <circle cx="13" cy="39" r="2.3" fill="#00D2FF" filter="url(#nodeGlow)"/>
    <circle cx="35" cy="39" r="2.5" fill="#49EACB" filter="url(#nodeGlow)"/>
    
    <!-- Extra "tip" nodes for dense DAG feel -->
    <circle cx="19" cy="9" r="1.8" fill="#7C3AED" filter="url(#nodeGlow)"/>
    <circle cx="29" cy="9" r="1.9" fill="#00D2FF" filter="url(#nodeGlow)"/>
    <circle cx="5" cy="22" r="1.7" fill="#49EACB" filter="url(#nodeGlow)"/>
    <circle cx="43" cy="22" r="1.7" fill="#3B82F6" filter="url(#nodeGlow)"/>
  </g>

  <!-- Subtle "C" or Kaspa "K" hint integrated into the DAG (premium mark, not literal letter) -->
  <path d="M29 13 Q33 20 30 29" fill="none" stroke="url(#dagGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
</svg>