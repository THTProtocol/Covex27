<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="50%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
  </defs>
  <g filter="url(#glow)">
    <line x1="7" y1="10" x2="7" y2="38" stroke="url(#g)" stroke-width="1.5" opacity="0.7"/>
    <line x1="7" y1="10" x2="18" y2="6" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="6" x2="24" y2="12" stroke="url(#g)" stroke-width="0.8" opacity="0.4"/>
    <line x1="7" y1="38" x2="18" y2="42" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="42" x2="24" y2="36" stroke="url(#g)" stroke-width="0.8" opacity="0.4"/>
    <circle cx="7" cy="10" r="3" fill="#49EACB"/>
    <circle cx="18" cy="6" r="2" fill="#7e14ff" opacity="0.85"/>
    <circle cx="24" cy="12" r="1.8" fill="#00D2FF" opacity="0.7"/>
    <circle cx="7" cy="24" r="3.2" fill="#00D2FF"/>
    <circle cx="7" cy="38" r="3" fill="#7e14ff"/>
    <circle cx="18" cy="42" r="2" fill="#49EACB" opacity="0.85"/>
    <circle cx="24" cy="36" r="1.8" fill="#00D2FF" opacity="0.7"/>
  </g>
</svg>
