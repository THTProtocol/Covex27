<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49EACB"/>
      <stop offset="45%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5" result="b1"/>
      <feGaussianBlur stdDeviation="3.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Refined DAG / Covenant node network -->
    <circle cx="8" cy="8" r="2.2" fill="#49EACB"/>
    <circle cx="8" cy="24" r="3.4" fill="#00D2FF"/>
    <circle cx="8" cy="40" r="2.2" fill="#7e14ff"/>
    <circle cx="24" cy="8" r="2" fill="#7e14ff" opacity="0.9"/>
    <circle cx="24" cy="40" r="2" fill="#49EACB" opacity="0.9"/>
    <circle cx="40" cy="8" r="2.2" fill="#00D2FF"/>
    <circle cx="40" cy="24" r="3.4" fill="#49EACB"/>
    <circle cx="40" cy="40" r="2.2" fill="#7e14ff"/>

    <line x1="8" y1="8" x2="24" y2="8" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
    <line x1="8" y1="24" x2="24" y2="8" stroke="url(#g)" stroke-width="1" opacity="0.55"/>
    <line x1="8" y1="24" x2="24" y2="40" stroke="url(#g)" stroke-width="1" opacity="0.55"/>
    <line x1="8" y1="40" x2="24" y2="40" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>

    <line x1="24" y1="8" x2="40" y2="8" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
    <line x1="24" y1="40" x2="40" y2="40" stroke="url(#g)" stroke-width="1.2" opacity="0.65"/>
    <line x1="24" y1="8" x2="40" y2="24" stroke="url(#g)" stroke-width="1" opacity="0.55"/>
    <line x1="24" y1="40" x2="40" y2="24" stroke="url(#g)" stroke-width="1" opacity="0.55"/>

    <line x1="8" y1="8" x2="8" y2="24" stroke="url(#g)" stroke-width="1.1" opacity="0.6"/>
    <line x1="8" y1="24" x2="8" y2="40" stroke="url(#g)" stroke-width="1.1" opacity="0.6"/>
    <line x1="40" y1="8" x2="40" y2="24" stroke="url(#g)" stroke-width="1.1" opacity="0.6"/>
    <line x1="40" y1="24" x2="40" y2="40" stroke="url(#g)" stroke-width="1.1" opacity="0.6"/>
  </g>
</svg>
