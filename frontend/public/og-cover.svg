<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Covex, the covenant explorer and studio for Kaspa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1018"/>
      <stop offset="0.55" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#0b2430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#70C7BA"/>
      <stop offset="1" stop-color="#49EACB"/>
    </linearGradient>
    <linearGradient id="ft" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d7fbf4"/><stop offset="1" stop-color="#7fe9d8"/></linearGradient>
    <linearGradient id="fl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5cead3"/><stop offset="1" stop-color="#2bb6a3"/></linearGradient>
    <linearGradient id="fr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#33c6b2"/><stop offset="1" stop-color="#178f80"/></linearGradient>
    <linearGradient id="fb" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#eafffb"/><stop offset="0.5" stop-color="#49EACB"/><stop offset="1" stop-color="#1c9d8c"/></linearGradient>
    <filter id="markglow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- BlockDAG motif, left -->
  <g stroke="#70C7BA" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path d="M80 150 L180 210 M80 150 L170 100 M170 100 L280 160 M180 210 L280 160 M180 210 L210 320 M280 160 L380 225"/>
  </g>
  <g fill="#70C7BA" fill-opacity="0.5">
    <circle cx="80" cy="150" r="6"/><circle cx="180" cy="210" r="8"/><circle cx="280" cy="160" r="6"/><circle cx="210" cy="320" r="7"/>
  </g>
  <!-- BlockDAG motif, right -->
  <g stroke="#70C7BA" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path d="M1120 480 L1020 420 M1120 480 L1030 530 M1030 530 L920 470 M1020 420 L920 470 M1020 420 L990 310 M920 470 L820 405"/>
  </g>
  <g fill="#70C7BA" fill-opacity="0.5">
    <circle cx="1120" cy="480" r="6"/><circle cx="1020" cy="420" r="8"/><circle cx="920" cy="470" r="6"/><circle cx="990" cy="310" r="7"/>
  </g>

  <!-- Crystalline mark -->
  <g transform="translate(528 70) scale(2.25)" filter="url(#markglow)">
    <path fill-rule="evenodd" fill="url(#fb)" d="M32 4 L56 18 L56 26 L44 19 L32 12 L14 22.5 L14 41.5 L32 52 L44 45 L56 38 L56 46 L32 60 L8 46 L8 18 Z"/>
    <g stroke="#eafffb" stroke-width="0.9" stroke-opacity="0.6" stroke-linejoin="round" fill="none"><path d="M32 12 L14 22.5 L14 41.5 L32 52"/></g>
    <g><path d="M49 17 L55 20.4 L49 23.8 L43 20.4 Z" fill="url(#ft)"/><path d="M43 20.4 L49 23.8 L49 30.6 L43 27.2 Z" fill="url(#fl)"/><path d="M55 20.4 L49 23.8 L49 30.6 L55 27.2 Z" fill="url(#fr)"/></g>
    <g><path d="M32 25 L39 29 L32 33 L25 29 Z" fill="url(#ft)"/><path d="M25 29 L32 33 L32 41 L25 37 Z" fill="url(#fl)"/><path d="M39 29 L32 33 L32 41 L39 37 Z" fill="url(#fr)"/></g>
    <g><path d="M49 40.2 L55 43.6 L49 47 L43 43.6 Z" fill="url(#ft)"/><path d="M43 43.6 L49 47 L49 53.8 L43 50.4 Z" fill="url(#fl)"/><path d="M55 43.6 L49 47 L49 53.8 L55 50.4 Z" fill="url(#fr)"/></g>
  </g>

  <!-- wordmark -->
  <text x="600" y="400" text-anchor="middle"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="112" font-weight="800" letter-spacing="30" fill="#E8F6F3">COVEX</text>
  <rect x="400" y="436" width="400" height="6" rx="3" fill="url(#accent)"/>
  <text x="600" y="492" text-anchor="middle"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="30" font-weight="500" letter-spacing="5" fill="#9fb8c9">THE COVENANT EXPLORER AND STUDIO FOR KASPA</text>
  <text x="600" y="534" text-anchor="middle"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" letter-spacing="3" fill="#5f7a8a">REAL ON-CHAIN DATA ONLY  ·  BUILT FOR THE TOCCATA MAINNET ERA</text>
</svg>
